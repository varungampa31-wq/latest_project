{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Appointment</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #001a33 0%, #003d80 50%, #007bff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.12);
            padding: 50px 70px;
            border-radius: 22px;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 50px rgba(0, 123, 255, 0.4);
            width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            animation: fadeIn 1.2s ease;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #cfe9ff;
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .form-container p {
            margin-bottom: 18px;
        }

        .form-container label {
            font-size: 16px;
            color: #e6f2ff;
        }

        .form-container select,
        .form-container textarea,
        .form-container input {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.95);
            font-size: 16px;
            color: #001a33;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #007bff, #00aaff);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 0 12px rgba(0, 170, 255, 0.5);
        }

        .btn-submit:hover {
            background: linear-gradient(90deg, #0066d6, #0088dd);
            transform: scale(1.06);
            box-shadow: 0 0 18px rgba(0, 170, 255, 0.7);
        }

        .back-link {
            display: block;
            margin-top: 20px;
            text-align: center;
            color: #cfe9ff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="form-container">
    <h2>Book Appointment</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn-submit">Book</button>
    </form>

    <a href="{% url 'student_dashboard' %}" class="back-link">My Appointments</a>
</div>

</body>
</html>
